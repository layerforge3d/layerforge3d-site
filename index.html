<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LayerForge</title>

<style>

body{
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0b0b;
color:white;
margin:0;
text-align:center;
}

header{
padding:80px 20px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
font-size:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:60px;
max-width:1200px;
margin:auto;
}

.card{
background:#111;
padding:30px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.price{
font-size:22px;
margin:10px 0;
}

button{
background:#22c55e;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

footer{
padding:60px;
color:#9ca3af;
}

</style>
</head>

<body>

<header>

<h1>LayerForge</h1>
<p class="subtitle">Diamo forma alle tue idee con la stampa 3D</p>

</header>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/400">
<h3>Portachiavi personalizzato</h3>
<p class="price">5€</p>

<a href="https://wa.me/393312735933?text=Ciao%20voglio%20un%20portachiavi%20personalizzato">
<button>Ordina</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<h3>Supporto Smartphone</h3>
<p class="price">12€</p>

<a href="https://wa.me/393312735933?text=Ciao%20sono%20interessato%20al%20supporto%20smartphone">
<button>Ordina</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<h3>Organizer scrivania</h3>
<p class="price">15€</p>

<a href="https://wa.me/393312735933?text=Ciao%20voglio%20un%20organizer%20da%20scrivania">
<button>Ordina</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<h3>Supporto cuffie gaming</h3>
<p class="price">20€</p>

<a href="https://wa.me/393312735933?text=Ciao%20sono%20interessato%20al%20supporto%20cuffie">
<button>Ordina</button>
</a>
</div>

</section>

<footer>

Contattaci su WhatsApp per prodotti personalizzati

</footer>

</body>
</html>
